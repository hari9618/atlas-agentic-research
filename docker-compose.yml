# Atlas local stack — bring up with: cp .env.example .env && docker compose up
# Free / self-hostable components only: Qdrant + self-hosted Langfuse + api + web.
name: atlas

services:
  # ---- Vector store -----------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Langfuse (observability) + its Postgres --------------------------
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev_pw   # DEV ONLY — change for any real use
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3001:3000"   # host 3001 → matches LANGFUSE_HOST in .env.example
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_dev_pw@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: dev_nextauth_secret_change_me      # DEV ONLY
      SALT: dev_salt_change_me                            # DEV ONLY
      TELEMETRY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Atlas API (FastAPI) ---------------------------------------------
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    environment:
      # Override the localhost defaults from .env for in-container networking:
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ./apps/api:/app          # dev hot-reload
    depends_on:
      qdrant:
        condition: service_healthy
    command: uvicorn atlas.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ---- Web (Next.js war-room) ------------------------------------------
  # Built from apps/web/Dockerfile. For local dev you can also skip this and run
  # `cd apps/web && npm run dev` against the api on :8000.
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
  langfuse_db_data:
